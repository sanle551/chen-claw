<!-- AI Chat - Enhanced Dark Theme with Animations -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat - Crypto Daily Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-gradient-start: #0f0c29;
      --bg-gradient-mid: #302b63;
      --bg-gradient-end: #24243e;
      --accent-cyan: #00d9ff;
      --accent-purple: #9d4edd;
      --accent-green: #00ff88;
      --text-primary: #ffffff;
      --text-secondary: #b8c2cc;
      --surface: rgba(255,255,255,0.05);
      --surface-hover: rgba(255,255,255,0.1);
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Noto Sans, Ubuntu, Cantarell, Helvetica Neue, Arial;
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-mid), var(--bg-gradient-end));
      color: var(--text-primary);
      display: flex; flex-direction: column;
    }
    header {
      padding: 16px 24px;
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand { display: flex; align-items: center; gap: 12px; font-weight: 700; letter-spacing: 0.5px; }
    .brand .icon { font-size: 22px; filter: drop-shadow(0 0 6px rgba(0,217,255,0.6)); }
    nav a { color: var(--text-secondary); text-decoration: none; margin-left: 18px; font-size: 14px; transition: var(--transition); }
    nav a:hover, nav a.active { color: var(--accent-cyan); text-shadow: 0 0 8px rgba(0,217,255,0.4); }
    .wrap { max-width: 960px; margin: 0 auto; padding: 24px; width: 100%; flex: 1; display: flex; flex-direction: column; }
    h1 { margin: 0 0 8px; font-size: 22px; }
    .sub { color: var(--text-secondary); margin-bottom: 16px; }
    .strategy-tabs { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .strategy-tab {
      position: relative;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      font-size: 14px;
    }
    .strategy-tab:hover { background: var(--surface-hover); transform: translateY(-2px); }
    .strategy-tab.active {
      color: #fff;
      border-color: rgba(0,217,255,0.5);
      box-shadow: 0 0 20px rgba(0,217,255,0.25), inset 0 0 12px rgba(0,217,255,0.15);
      animation: pulse-glow 2s infinite;
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(0,217,255,0.25), inset 0 0 12px rgba(0,217,255,0.15); }
      50% { box-shadow: 0 0 28px rgba(0,217,255,0.45), inset 0 0 16px rgba(0,217,255,0.25); }
    }
    .quick-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .chip {
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: var(--surface);
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
      font-size: 13px;
    }
    .chip:hover { background: var(--surface-hover); transform: translateY(-2px); border-color: rgba(157,78,221,0.5); }
    .chat-container {
      flex: 1;
      display: flex; flex-direction: column;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(8px);
    }
    .messages { flex: 1; overflow-y: auto; padding: 16px; }
    .msg { max-width: 80%; margin: 10px 0; padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 15px; position: relative; }
    .msg.user { margin-left: auto; background: linear-gradient(135deg, rgba(0,217,255,0.25), rgba(0,217,255,0.1)); border: 1px solid rgba(0,217,255,0.3); color: #e6faff; animation: slideInRight 0.4s ease both; }
    .msg.assistant { margin-right: auto; background: linear-gradient(135deg, rgba(157,78,221,0.25), rgba(157,78,221,0.1)); border: 1px solid rgba(157,78,221,0.3); color: #f5eaff; animation: slideInLeft 0.4s ease both; }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
    .meta { font-size: 12px; color: var(--text-secondary); margin-top: 6px; display: flex; gap: 8px; align-items: center; }
    .meta .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
    .composer { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.08); background: rgba(0,0,0,0.25); display: flex; gap: 10px; align-items: center; }
    select, input[type="text"] {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-primary);
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
    }
    input[type="text"] { flex: 1; }
    select { min-width: 110px; }
    button.send {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
      color: #fff;
      border: none;
      padding: 10px 16px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,217,255,0.35);
      transition: var(--transition);
    }
    button.send:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(0,217,255,0.5); }
    .typing { font-style: italic; color: var(--text-secondary); }
    @media (max-width: 640px) {
      .wrap { padding: 16px; }
      .msg { max-width: 90%; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand"><div class="icon">📊</div><div>Crypto Daily Analyzer</div></div>
    <nav>
      <a href="/">首页</a>
      <a href="/dashboard">仪表盘</a>
      <a class="active" href="/ai-chat">🤖 AI分析</a>
      <a href="/settings">设置</a>
    </nav>
  </header>
  <div class="wrap">
    <h1>🤖 AI 分析助手</h1>
    <div class="sub">选择策略并提问，获取基于策略的交易建议与实时决策报告。</div>
    <div class="strategy-tabs" id="strategyTabs">
      <div class="strategy-tab active" data-strategy="comprehensive">综合分析</div>
      <div class="strategy-tab" data-strategy="trend">🐆 趋势策略</div>
      <div class="strategy-tab" data-strategy="value">🦥 价值投资</div>
      <div class="strategy-tab" data-strategy="macro">🦉 宏观择时</div>
      <div class="strategy-tab" data-strategy="arbitrage">🦈 套利博弈</div>
    </div>
    <div class="quick-actions">
      <div class="chip" onclick="ask('分析 BTC 当前走势')">📈 BTC分析</div>
      <div class="chip" onclick="ask('ETH 支撑位和阻力位')">🎯 ETH技术位</div>
      <div class="chip" onclick="ask('推荐今日可关注的代币')">🔥 今日机会</div>
      <div class="chip" onclick="ask('市场风险评估')">⚠️ 风险评估</div>
      <div class="chip" onclick="ask('基于猎豹策略的短线建议')">🐆 短线策略</div>
      <div class="chip" onclick="ask('基于树懒策略的长线建议')">🦥 长线策略</div>
    </div>
    <div class="chat-container">
      <div class="messages" id="messages">
        <div class="msg assistant" id="intro">
          <div>你好！我是你的加密货币分析助手。我可以帮你：</div>
          <ul style="margin:8px 0 0 18px; padding:0;">
            <li>分析特定代币的技术面和基本面</li>
            <li>提供具体的入场、止损、止盈点位</li>
            <li>基于不同策略（趋势/价值/宏观/套利）给出建议</li>
            <li>评估市场风险和机会</li>
          </ul>
          <div class="meta"><span class="dot"></span>AI 助手</div>
        </div>
      </div>
      <div class="composer">
        <select id="tokenSelect"><option value="">选择代币</option><option>BTC</option><option>ETH</option><option>SOL</option><option>BNB</option></select>
        <input id="userInput" type="text" placeholder="输入你的问题，例如：'分析 BTC 当前是否适合买入'" onkeydown="if(event.key==='Enter') submitMsg()">
        <button class="send" onclick="submitMsg()">发送</button>
      </div>
    </div>
  </div>
  <script>
    let currentStrategy='comprehensive';
    const tabs=document.querySelectorAll('.strategy-tab');
    tabs.forEach(t=>t.addEventListener('click',()=>{tabs.forEach(x=>x.classList.remove('active'));t.classList.add('active');currentStrategy=t.dataset.strategy;}));
    function ask(text){document.getElementById('userInput').value=text;submitMsg();}
    async function submitMsg(){
      const input=document.getElementById('userInput');const text=input.value.trim();if(!text)return;input.value='';
      const messages=document.getElementById('messages');
      const userDiv=document.createElement('div');userDiv.className='msg user';userDiv.textContent=text;messages.appendChild(userDiv);messages.scrollTop=messages.scrollHeight;
      const loading=document.createElement('div');loading.className='msg assistant';loading.id='loading';loading.innerHTML='<div class="typing">AI 正在思考</div>';messages.appendChild(loading);messages.scrollTop=messages.scrollHeight;
      try{
        const resp=await fetch('/api/ai-chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text,strategy:currentStrategy})});
        const data=await resp.json();
        loading.remove();
        const aiDiv=document.createElement('div');aiDiv.className='msg assistant';
        const contentDiv=document.createElement('div');typewriter(contentDiv,data.response||'无回复');aiDiv.appendChild(contentDiv);
        const meta=document.createElement('div');meta.className='meta';meta.innerHTML='<span class="dot"></span>AI 助手 · '+new Date().toLocaleTimeString();aiDiv.appendChild(meta);
        messages.appendChild(aiDiv);messages.scrollTop=messages.scrollHeight;
      }catch(e){loading.innerHTML='<div style="color:#ff6b6b">请求失败，请稍后重试</div>';}
    }
    function typewriter(el,text,speed=12){let i=0;el.textContent='';function step(){if(i<text.length){el.textContent+=text.charAt(i);i++;setTimeout(step,speed);}}step();}
  </script>
</body>
</html>
